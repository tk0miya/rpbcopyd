name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Release binary
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt
          # Skip Rust cache to avoid the cache-poisoning attack at release time:
          # a poisoned cache written from a PR could otherwise be reused here
          # and end up shipped as a GitHub Release artifact.
          # See https://docs.zizmor.sh/audits/#cache-poisoning
          cache: false
      - name: Build (Linux)
        run: |
          cargo install cross
          cross build --target ${{ matrix.target }} --release --all-features --verbose
        if: startsWith(matrix.os, 'ubuntu')
      - name: build (macOS)
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --target ${{ matrix.target }} --release --all-features --verbose
        if: startsWith(matrix.os, 'macos')
      - name: Rename artifacts
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          mv "target/${TARGET}/release/rpbcopyd" "target/${TARGET}/release/rpbcopyd-${REF_NAME}-${TARGET}"
          mv "target/${TARGET}/release/rpbcopy" "target/${TARGET}/release/rpbcopy-${REF_NAME}-${TARGET}"
          mv "target/${TARGET}/release/rpbpaste" "target/${TARGET}/release/rpbpaste-${REF_NAME}-${TARGET}"
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          # Create the release if this matrix entry is the first to reach this step;
          # otherwise reuse the existing release created by a sibling matrix entry.
          gh release create "$REF_NAME" --title "$REF_NAME" --generate-notes 2>/dev/null || true
          gh release upload "$REF_NAME" \
            "target/${TARGET}/release/rpbcopyd-${REF_NAME}-${TARGET}" \
            "target/${TARGET}/release/rpbcopy-${REF_NAME}-${TARGET}" \
            "target/${TARGET}/release/rpbpaste-${REF_NAME}-${TARGET}" \
            --clobber
